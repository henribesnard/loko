services:
  loko:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - loko-data:/root/.loko
    environment:
      - PYTHONUNBUFFERED=1
      - LOKO_MODE=server
      # Persist accounts DB in the Docker volume alongside bots data
      - LOKO_DATA_DIR=/root/.loko
      - LOKO_AUDIT_DB_PATH=/root/.loko/audit.db
      - LOKO_ADMIN_TOKEN=${LOKO_ADMIN_TOKEN:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - LOKO_LLM_API_KEY=${LOKO_LLM_API_KEY:-}
      - LOKO_LLM_BASE_URL=${LOKO_LLM_BASE_URL:-}
      - LOKO_LLM_MODEL=${LOKO_LLM_MODEL:-}
      - LOKO_LLM_PROVIDER=${LOKO_LLM_PROVIDER:-openai_compat}
      - LOKO_SECRET_KEY=${LOKO_SECRET_KEY:-}
      - LOKO_CORS_ORIGINS=${LOKO_CORS_ORIGINS:-}
      - LOKO_SESSION_RETENTION_DAYS=${LOKO_SESSION_RETENTION_DAYS:-30}
      # Rate limiting (R1) — values are slowapi rate strings
      - LOKO_RATE_SESSIONS=${LOKO_RATE_SESSIONS:-10/minute}
      - LOKO_RATE_MESSAGES=${LOKO_RATE_MESSAGES:-30/minute}
      - LOKO_RATE_FEEDBACK=${LOKO_RATE_FEEDBACK:-30/minute}
      - LOKO_RATE_READ=${LOKO_RATE_READ:-60/minute}
      # ML features (A1/A2/A6)
      - LOKO_ML=${LOKO_ML:-on}
      - LOKO_BASE_MODEL_PATH=/app/models/base/minilm
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      # Escalation provider (A3 — set to "mock" for dev/test)
      - LOKO_ESCALATION_PROVIDER=${LOKO_ESCALATION_PROVIDER:-mock}
    restart: unless-stopped
    # C4: Persistent logs with rotation (PLAN_AMELIORATION_COMPLET_LOKO_2026-07-10.md)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  loko-data:
