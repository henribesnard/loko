name: Deploy to Production
# Implements C3 from PLAN_AMELIORATION_COMPLET_LOKO_2026-07-10.md

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags (v0.3.8, v1.0.0, etc.)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tag resolution

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

          # Find previous version tag for rollback (must be lower than current)
          PREV_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname \
            | awk -v cur="$GITHUB_REF_NAME" 'found{print;exit} $0==cur{found=1}')
          echo "prev_tag=${PREV_TAG:-none}" >> $GITHUB_OUTPUT
          echo "Current: $GITHUB_REF_NAME, Previous: ${PREV_TAG:-none}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST << ENDSSH
            set -e
            cd /opt/loko

            # Pull latest code and tags
            git fetch --tags --force
            git stash --include-untracked || true
            git checkout ${{ steps.version.outputs.tag }}

            # Ensure scripts are executable
            chmod +x tools/*.sh 2>/dev/null || true

            # Backup before deploy (safety)
            ./tools/backup_loko.sh || echo "Warning: Backup failed, continuing"

            # Pull pre-built image from GHCR (not --build)
            export LOKO_VERSION=${{ steps.version.outputs.version }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "Deployment started: ${{ steps.version.outputs.tag }}"
          ENDSSH

      - name: Smoke test
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "Waiting for service to start..."
          sleep 5

          for i in $(seq 1 30); do
            RESPONSE=$(ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST \
              "curl -sf http://localhost:8001/health 2>/dev/null || true")

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              # Verify deployed version matches expected
              DEPLOYED_VER=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true)
              echo "Health check passed (version: ${DEPLOYED_VER:-unknown})"

              if [ -n "$DEPLOYED_VER" ] && [ "$DEPLOYED_VER" != "${{ steps.version.outputs.version }}" ]; then
                echo "WARNING: Deployed version ($DEPLOYED_VER) differs from expected (${{ steps.version.outputs.version }})"
              fi
              exit 0
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done

          echo "Health check failed after 60s"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          if [ "$PREV_TAG" = "none" ]; then
            echo "No previous version tag found, cannot rollback"
            exit 1
          fi

          PREV_VERSION="${PREV_TAG#v}"
          echo "Deployment failed, rolling back to $PREV_TAG..."

          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST << ENDSSH
            set -e
            cd /opt/loko

            git fetch --tags --force
            git stash --include-untracked || true
            git checkout $PREV_TAG

            export LOKO_VERSION=$PREV_VERSION
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Verify rollback health
            sleep 10
            for i in \$(seq 1 15); do
              if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                echo "Rollback to $PREV_TAG successful"
                exit 0
              fi
              sleep 2
            done
            echo "WARNING: Rollback health check inconclusive"
          ENDSSH

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## LOKO ${{ steps.version.outputs.version }}

            **Deployment:** Successful
            **Health check:** Passed
            **Previous version:** ${{ steps.version.outputs.prev_tag }}

            ### Rollback
            If issues are found, rollback from VPS:
            ```bash
            ssh root@VPS_HOST "cd /opt/loko && ./tools/rollback_loko.sh ${{ steps.version.outputs.prev_tag }}"
            ```

            See commit history for changes.
          draft: false
          prerelease: false

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful: ${{ steps.version.outputs.tag }}"
          else
            echo "Deployment FAILED: ${{ steps.version.outputs.tag }}"
            echo "Rollback attempted to: ${{ steps.version.outputs.prev_tag }}"
          fi
