name: LOKO CI/CD Pipeline
# Implements C1 from PLAN_AMELIORATION_COMPLET_LOKO_2026-07-10.md

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # V2: Guard against worktree/dataset modifications
  guard-datasets:
    name: Guard Datasets & Worktree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for dataset modifications without hash update
        run: |
          # Check if any dataset files were modified
          MODIFIED_DATASETS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^data/.*\.(json|csv|txt)$' || true)

          if [ -n "$MODIFIED_DATASETS" ]; then
            echo "❌ Dataset files modified:"
            echo "$MODIFIED_DATASETS"

            # Check if corresponding hash file was updated
            HASH_UPDATED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^data/.*\.hash$' || true)

            if [ -z "$HASH_UPDATED" ]; then
              echo "❌ ERROR: Dataset modified without hash update (Interdit #5)"
              echo "Modified datasets: $MODIFIED_DATASETS"
              echo "You must update the corresponding .hash file when modifying datasets"
              exit 1
            fi

            echo "✅ Dataset hash files updated"
          fi

      - name: Check frozen eval datasets integrity (Interdit #5 — held-out)
        run: |
          # Any change to eval/datasets/*.csv must come with an updated HASHES.sha256
          MODIFIED_FROZEN=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^eval/datasets/.*\.csv$' || true)

          if [ -n "$MODIFIED_FROZEN" ]; then
            echo "⚠️ Frozen eval datasets modified:"
            echo "$MODIFIED_FROZEN"

            HASHES_UPDATED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^eval/datasets/HASHES\.sha256$' || true)

            if [ -z "$HASHES_UPDATED" ]; then
              echo "❌ ERROR: eval/datasets modified without HASHES.sha256 update (Interdit #5)"
              exit 1
            fi
            echo "✅ HASHES.sha256 updated alongside frozen datasets"
          fi

          # Whatever the diff says, the committed HASHES must match the committed files
          if [ -f eval/datasets/HASHES.sha256 ]; then
            (cd eval/datasets && sha256sum -c HASHES.sha256) || {
              echo "❌ ERROR: eval/datasets content does not match HASHES.sha256 (Interdit #5)"
              exit 1
            }
            echo "✅ eval/datasets integrity verified against HASHES.sha256"
          fi

      - name: Deep dataset validation (C5 — make_datasets.py --check)
        run: |
          python tools/make_datasets.py --check eval/datasets/

      - name: Check for uncommitted changes in worktree (V2)
        run: |
          # This check should be done before tests to ensure clean state
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ ERROR: Uncommitted changes detected in worktree (Interdit #3)"
            git status --porcelain
            exit 1
          fi

  # H1: Guard against client-specific mentions
  guard-client-mentions:
    name: Guard Client Mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run client mention guard
        run: |
          pytest tests/test_no_client_mention.py -v

  # Ruff linting
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check loko/ tests/ tools/

      - name: Run ruff format check
        run: ruff format --check loko/ tests/ tools/

  # Python tests in container (per protocol §0.2)
  test-python:
    name: Test Python (in-container)
    runs-on: ubuntu-latest
    needs: [guard-datasets, guard-client-mentions, lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t loko:test .

      - name: Run pytest in container with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/coverage:/app/coverage \
            -e LOKO_ML=on \
            -e LOKO_MODE=test \
            -e HF_HUB_OFFLINE=1 \
            -e TRANSFORMERS_OFFLINE=1 \
            loko:test \
            sh -c "pytest tests/ -v --tb=short --cov=loko --cov-report=xml:coverage.xml --cov-report=html:htmlcov && cp coverage.xml htmlcov /app/coverage/ 2>/dev/null || true"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-python
          path: |
            coverage/coverage.xml
            coverage/htmlcov/
          retention-days: 30

      - name: Display coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage.xml ]; then
            echo "✅ Coverage report generated"
            # Extract coverage percentage (basic parsing)
            grep -oP 'line-rate="\K[^"]+' coverage/coverage.xml | head -n1 | awk '{printf "Coverage: %.1f%%\n", $1*100}'
          fi

  # Frontend tests
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm test

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # V1: Version uniqueness check
  guard-version:
    name: Guard Version Uniqueness (V1)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version uniqueness
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "Current version: $VERSION"

          # Check if this version tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ ERROR: Version v$VERSION already exists (Interdit V1)"
            echo "You must bump the version in pyproject.toml"
            exit 1
          fi

  # T1: Version sync check (tag pushed must match pyproject.toml)
  version-sync:
    name: Version Sync (T1)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check version sync against tag
        run: |
          python tools/check_version_sync.py --against-tag ${{ github.ref_name }}