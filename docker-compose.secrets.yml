# Optional override — file-based Docker secrets (K1).
#
# Use this ONLY when secret files are set up on the host:
#   ./tools/setup_secrets.sh init && ./tools/setup_secrets.sh generate
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d

services:
  loko:
    secrets:
      - loko_admin_token
      - smtp_password
      - loko_llm_api_key
    environment:
      - LOKO_ADMIN_TOKEN_FILE=/run/secrets/loko_admin_token
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - LOKO_LLM_API_KEY_FILE=/run/secrets/loko_llm_api_key

secrets:
  loko_admin_token:
    file: ${LOKO_SECRETS_DIR:-.}/secrets/loko_admin_token.txt
  smtp_password:
    file: ${LOKO_SECRETS_DIR:-.}/secrets/smtp_password.txt
  loko_llm_api_key:
    file: ${LOKO_SECRETS_DIR:-.}/secrets/loko_llm_api_key.txt
