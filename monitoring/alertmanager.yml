# AlertManager configuration for LOKO (OBS-3)
#
# Customize the email receiver with your SMTP settings before deploying.
# See docs/ALERTING_O4.md for setup instructions.

global:
  resolve_timeout: 5m

route:
  receiver: 'email'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'email'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@loko.wezon.fr'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alerts@loko.wezon.fr'
        auth_password: '${SMTP_PASSWORD}'
        send_resolved: true
