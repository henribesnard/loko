# Prometheus configuration for LOKO (OBS-3)
#
# Scrapes the /metrics endpoint on the loko container.
# Admin token is passed via Docker secret (credentials_file).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'loko'
    static_configs:
      - targets: ['loko:8000']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/admin_token
